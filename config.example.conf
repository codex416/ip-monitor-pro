#!/bin/bash

# ==========================================
# IP Monitor Pro 配置文件模板
# ==========================================


# ==============================
# Telegram机器人配置
# ==============================


# BotFather创建的机器人Token

BOT_TOKEN="YOUR_TELEGRAM_BOT_TOKEN"



# Telegram Chat ID

CHAT_ID="YOUR_CHAT_ID"



# ==============================
# 检测设置
# ==============================


